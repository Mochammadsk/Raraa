<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.7.2/font/bootstrap-icons.css" />
    <title>Raraa</title>
  </head>
  <body>
    <div class="card bg-love">
      <img id="thumb" src="image.jpeg" alt="thumb" class="img-thumb" />
      <h1 class="latin text-center">Hai Raraa 😊</h1>
      <h2 class="text-center">gabolee jauh jauh loh </h2>
      <div class="card-footer">
        <div class="btn mau" onclick="mau()">heeh 😍</div>
        <div class="btn gak" onclick="gakmau(this)" onmouseover="gakmau(this)">gamau ☹️</div>
      </div>
      <div class="info text-center mt-16" id="info"></div>
      <div class="water-mark text-center">
        <a href="https://www.instagram.com/oriorkamu"><i class="bi bi-instagram"> Raraa</i></a>
        <a href="https://www.instagram.com/mochammadsk_"><i class="bi bi-instagram"> Kalul</i></a>
      </div>
    </div>
    <div class="text-center mt-16" id="musicbox">
      <audio id="music" src="music.mp3" controls></audio>
    </div>
  </body>
  <script>
    var _info = document.getElementById("info");
    var _music = document.getElementById("music");
    function gakmau(element) {
      element.style.position = "absolute";
      element.style.left = `${Math.floor(Math.random() * 90)}%`;
      element.style.top = `${Math.floor(Math.random() * 90)}%`;

      _info.innerHTML = "Harus Mau Pokoknya 🙄";
    }
    function mau() {
      if (_music.paused) _music.play();
      _info.innerHTML = "Makasih yaah . ini lagu untuk kamu.";
      document.getElementById("musicbox").style.visibility = "visible";
    }
  </script>
</html>
